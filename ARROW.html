  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  background-attachment: fixed;
  }

.container {
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(0.5px);
  -webkit-backdrop-filter: blur(40px);

  color: white;
  padding: 20px;
  margin: 100px auto;
  width: 70%;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

  li {
    text-align: left;
    margin: 10px 0;
    padding: 8px;
    border-radius: 6px;
    transition: all 0.3s ease;
  }

  li:hover {
    filter: brightness(1.2);
    cursor: pointer;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  /* 🎨 kleuren */
  .arrow { background: green; color: white; }
  .bat { background: purple; color: white; }
  .lightning { background: orange; color: black; }
  .constantine { background: orangered; color: black; }
  .flash { background: red; color: white; }
  .ray { background: yellow; color: black; }
  .lot { background: darkolivegreen; color: black; }
  .star { background: darkblue; color: white; }
  .super { background: royalblue; color: white; }
  .sl { background: lightblue; color: black; }
  .vixen { background: indianred; color: black; }

  /* ✔ checked */
  .done {
    text-decoration: line-through;
    opacity: 0.6;

</style>

<script>
const checkboxes = document.querySelectorAll("#taskList input");

// 🔄 Laden bij start
checkboxes.forEach((box, index) => {
  const saved = localStorage.getItem("task-" + index);

  if (saved === "true") {
    box.checked = true;
    box.closest("li").classList.add("done");
  }

  // 💾 Opslaan bij klikken
  box.addEventListener("change", function () {
    localStorage.setItem("task-" + index, this.checked);
    this.closest("li").classList.toggle("done", this.checked);
  });
});
</script>
